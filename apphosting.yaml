# Firebase App Hosting — Wodsi (Vite SPA)
# Docs: https://firebase.google.com/docs/app-hosting
#
# Variables: copiá las de .env.local en Firebase Console → App Hosting → tu backend
# → Settings → Environment (BUILD + RUNTIME), o completá la sección env: abajo.

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  buildCommand: npm ci && npm run build
  runCommand: npm start

# Config web de Firebase (pública; Vite la embebe en el build)
env:
  - variable: EXPO_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBgFsbbFk8OeojswB7sv7mrDYGMHxfho8U
    availability: [BUILD, RUNTIME]
  - variable: EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: wodsi-47ffb.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: EXPO_PUBLIC_FIREBASE_PROJECT_ID
    value: wodsi-47ffb
    availability: [BUILD, RUNTIME]
  - variable: EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: wodsi-47ffb.firebasestorage.app
