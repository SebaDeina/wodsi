# Firebase App Hosting — Wodsi (Vite SPA)
# Docs: https://firebase.google.com/docs/app-hosting
#
# Variables: copiá las de .env.local en Firebase Console → App Hosting → tu backend
# → Settings → Environment (BUILD + RUNTIME), o completá la sección env: abajo.

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  buildCommand: npm ci && npm run build
  runCommand: npm start

# Descomentá y completá si preferís el archivo en vez de la consola:
# env:
